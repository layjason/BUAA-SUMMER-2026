# Docker Compose 配置 - MayoiStar CLIP 分类服务（GPU + Kafka Consumer）
# 启动方式：
#   cp .env.example .env && vim .env    # 填入 Java 服务器 IP
#   docker compose up -d --scale clip-classifier=2
#
# 前置条件：
#   - NVIDIA Container Toolkit 已安装（https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html）
#   - Java 服务器的 Kafka（9092）和 RustFS（9000）端口可从本机访问
#
# 环境变量配置见 .env 文件或 .env.example

services:
  clip-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    image: mayoistar-clip:gpu
    expose:
      - "8000"
    environment:
      - MODE=kafka
      - HF_HOME=/app/.cache/huggingface
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_GROUP_ID=${KAFKA_GROUP_ID:-mayoistar-clip-gpu}
      - KAFKA_REQUEST_TOPIC=${KAFKA_REQUEST_TOPIC:-clip-classify-request}
      - KAFKA_RESPONSE_TOPIC=${KAFKA_RESPONSE_TOPIC:-clip-classify-response}
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-mayoistar-media}
      - CONSUMER_MAX_RETRIES=${CONSUMER_MAX_RETRIES:-3}
    volumes:
      - clip_model_cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  clip_model_cache:
