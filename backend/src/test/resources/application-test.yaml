spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:mayoistar_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

mayoistar:
  test:
    seed:
      placeholder:
        enabled: false
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256
    access-token-expire: 3600
    refresh-token-expire: 2592000
