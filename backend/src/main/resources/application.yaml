spring:
  application:
    name: mayoistar
  profiles:
      default: dev
  config:
    import: optional:file:.env[.properties]
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${MAYOISTAR_REDIS_HOST:localhost}
      port: ${MAYOISTAR_REDIS_PORT:6379}
      password: ${MAYOISTAR_REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 3000ms
      lettuce:
        shutdown-timeout: 200ms
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms
  mail:
    host: ${MAYOISTAR_MAIL_HOST:example.com}
    port: ${MAYOISTAR_MAIL_PORT:587}
    username: ${MAYOISTAR_MAIL_USERNAME:admin@example.com}
    password: ${MAYOISTAR_MAIL_PASSWORD:your-smtp-password-or-auth-code}
    properties:
      mail.smtp.auth: ${MAYOISTAR_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAYOISTAR_MAIL_SMTP_STARTTLS_ENABLE:true}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mayoistar:
  jwt:
    secret: ${MAYOISTAR_JWT_SECRET}
    access-token-expire: 3600
    refresh-token-expire: 2592000
  mail:
    activation-link-base: ${MAYOISTAR_ACTIVATION_BASE_URL:http://localhost:5173/activate}
    password-reset-link-base: ${MAYOISTAR_PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}
    sender: ${MAYOISTAR_MAIL_SENDER:admin@example.com}
  storage:
    s3:
      endpoint: ${MAYOISTAR_S3_ENDPOINT:http://localhost:9000}
      region: ${MAYOISTAR_S3_REGION:us-east-1}
      access-key: ${MAYOISTAR_S3_ACCESS_KEY:rustfsadmin}
      secret-key: ${MAYOISTAR_S3_SECRET_KEY:rustfsadmin}
      bucket: ${MAYOISTAR_S3_BUCKET:mayoistar-media}
  media:
    access:
      signing-secret: ${MAYOISTAR_MEDIA_SIGNING_SECRET:${MAYOISTAR_JWT_SECRET:dev-media-signing-secret-change-me}}
      public-avatar-ttl: ${MAYOISTAR_MEDIA_PUBLIC_AVATAR_TTL:7d}
      public-activity-image-ttl: ${MAYOISTAR_MEDIA_PUBLIC_ACTIVITY_IMAGE_TTL:24h}
      private-ttl: ${MAYOISTAR_MEDIA_PRIVATE_TTL:2h}
      refresh-request-limit-per-minute: ${MAYOISTAR_MEDIA_REFRESH_REQUEST_LIMIT_PER_MINUTE:30}
      refresh-media-limit-per-minute: ${MAYOISTAR_MEDIA_REFRESH_MEDIA_LIMIT_PER_MINUTE:1000}
      batch-size-limit: ${MAYOISTAR_MEDIA_BATCH_SIZE_LIMIT:100}
