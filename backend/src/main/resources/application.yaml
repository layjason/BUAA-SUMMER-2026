spring:
  application:
    name: mayoistar
  config:
    import: optional:file:.env[.properties]
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAYOISTAR_MAIL_HOST}
    port: ${MAYOISTAR_MAIL_PORT}
    username: ${MAYOISTAR_MAIL_USERNAME}
    password: ${MAYOISTAR_MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mayoistar:
  jwt:
    secret: ${MAYOISTAR_JWT_SECRET}
    access-token-expire: 3600
    refresh-token-expire: 2592000
  mail:
    activation-link-base: ${MAYOISTAR_ACTIVATION_BASE_URL}
    password-reset-link-base: ${MAYOISTAR_PASSWORD_RESET_BASE_URL}
    sender: ${MAYOISTAR_MAIL_SENDER}
