spring:
  application:
    name: mayoistar
  profiles:
      default: dev
  config:
    import: optional:file:.env[.properties]
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${MAYOISTAR_REDIS_HOST:localhost}
      port: ${MAYOISTAR_REDIS_PORT:6379}
      password: ${MAYOISTAR_REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 3000ms
      lettuce:
        shutdown-timeout: 200ms
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms
  mail:
    host: ${MAYOISTAR_MAIL_HOST:example.com}
    port: ${MAYOISTAR_MAIL_PORT:587}
    username: ${MAYOISTAR_MAIL_USERNAME:admin@example.com}
    password: ${MAYOISTAR_MAIL_PASSWORD:your-smtp-password-or-auth-code}
    properties:
      mail.smtp.auth: ${MAYOISTAR_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAYOISTAR_MAIL_SMTP_STARTTLS_ENABLE:true}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: mayoistar-backend
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: io.github.layjason.mayoistar.service.ai

mayoistar:
  jwt:
    secret: ${MAYOISTAR_JWT_SECRET}
    access-token-expire: 3600
    refresh-token-expire: 2592000
  mail:
    activation-link-base: ${MAYOISTAR_ACTIVATION_BASE_URL:http://localhost:3005/activate}
    password-reset-link-base: ${MAYOISTAR_PASSWORD_RESET_BASE_URL:http://localhost:3005/reset-password}
    sender: ${MAYOISTAR_MAIL_SENDER:admin@example.com}
  storage:
    s3:
      endpoint: ${MAYOISTAR_S3_ENDPOINT:http://localhost:9000}
      region: ${MAYOISTAR_S3_REGION:us-east-1}
      access-key: ${MAYOISTAR_S3_ACCESS_KEY:rustfsadmin}
      secret-key: ${MAYOISTAR_S3_SECRET_KEY:rustfsadmin}
      bucket: ${MAYOISTAR_S3_BUCKET:mayoistar-media}
  media:
    access:
      signing-secret: ${MAYOISTAR_MEDIA_SIGNING_SECRET}
  ai:
    clip:
      endpoint: ${MAYOISTAR_CLIP_ENDPOINT:http://localhost:8000}
      timeout-seconds: 60
      request-topic: clip-classify-request
      response-topic: clip-classify-response
      request-dlq-topic: clip-classify-request-dlq
      request-timeout-seconds: 30
      request-retry-max: 3
    content-review:
      endpoint: ${MAYOISTAR_ALIYUN_IMAGEAUDIT_ENDPOINT:}
      access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
      access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
      text-labels:
        - ad
      image-scenes:
        - porn
        - logo
    activity-planning:
      endpoint: ${MAYOISTAR_AI_ACTIVITY_PLANNING_ENDPOINT:}
      model: ${MAYOISTAR_AI_ACTIVITY_PLANNING_MODEL:}
      api-key: ${MAYOISTAR_AI_ACTIVITY_PLANNING_API_KEY:}
      timeout-seconds: 60
    rate-limit:
      max-requests-per-minute: ${MAYOISTAR_AI_MAX_REQUESTS_PER_MINUTE:20}
  check-in:
    signing-secret: ${MAYOISTAR_CHECKIN_SIGNING_SECRET:${MAYOISTAR_JWT_SECRET:dev-checkin-signing-secret-change-me}}
    token-expire-seconds: 900
    location-check-meters: 500
