<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#F5F3FF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F5F3FF;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background-color:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
        <tr>
          <td align="center" style="padding:36px 32px 0 32px;">
            <img src="cid:logo" alt="迷星群聚" width="56" height="56" style="display:block;border:0;border-radius:14px;">
          </td>
        </tr>
        <tr>
          <td align="center" style="padding:24px 32px 0 32px;">
            <h1 style="margin:0;font-size:22px;font-weight:700;color:#2D3436;text-align:center;" th:text="${titleText}">重置您的迷星群聚密码</h1>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px 0 32px;font-size:15px;line-height:1.7;color:#2D3436;">
            <p style="margin:0;" th:text="${bodyText}">我们收到了您重置密码的请求。请点击下方按钮设置新密码。</p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding:24px 32px 0 32px;">
            <a th:href="${link}" target="_blank" style="display:inline-block;padding:14px 48px;background-color:#6C5CE7;color:#FFFFFF;font-size:16px;font-weight:600;text-decoration:none;border-radius:8px;text-align:center;" th:text="${buttonText}">重 置 密 码</a>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px 0 32px;">
            <p style="margin:0;font-size:13px;color:#636E72;line-height:1.6;">
              若按钮无法点击，请复制以下链接到浏览器：<br>
              <a th:href="${link}" style="color:#6C5CE7;word-break:break-all;" th:text="${link}">http://example.com</a>
            </p>
            <p style="margin:8px 0 0 0;font-size:12px;color:#636E72;" th:text="${hintExtraText}">此链接 24 小时内有效，仅可使用一次。若您未请求此操作，请忽略此邮件，您的密码将保持不变。</p>
          </td>
        </tr>
        <tr>
          <td style="padding:32px 32px 24px 32px;border-top:1px solid #E8E8E8;margin-top:24px;">
            <p style="margin:0;font-size:12px;color:#636E72;text-align:center;">迷星群聚 &mdash; 发现身边的精彩</p>
          </td>
        </tr>
      </table>
      <p style="margin-top:20px;font-size:12px;color:#636E72;">此邮件由系统自动发送，请勿回复</p>
    </td>
  </tr>
</table>
</body>
</html>
