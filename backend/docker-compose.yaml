services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mayoistar-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAYOISTAR_DB_HOST: postgres
      MAYOISTAR_DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      MAYOISTAR_REDIS_HOST: redis
      MAYOISTAR_REDIS_PORT: 6379
      MAYOISTAR_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAYOISTAR_S3_ENDPOINT: http://rustfs:9000
      MAYOISTAR_S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      MAYOISTAR_S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      MAYOISTAR_S3_BUCKET: ${MAYOISTAR_S3_BUCKET:-mayoistar-media}
    ports:
      - "${MAYOISTAR_SERVER_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - mayoistar

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mayoistar

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: >
      redis-server
      --appendonly yes
      --tcp-keepalive 60
      --timeout 0
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mayoistar

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-ec",
          'host="$${RUSTFS_HEALTHCHECK_HOST:-127.0.0.1}"; curl -fsS "http://$${host}:9000/health" && curl -fsS "http://$${host}:9001/rustfs/console/health"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - mayoistar

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'

      # 1. 定义三种监听器的名称
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      # 2. 绑定 0.0.0.0 的三个端口
      KAFKA_LISTENERS: 'CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092'
      # 3. 核心：告诉客户端如何连接自己
      # - Docker 内部请求返回 kafka:29092
      # - 外部请求返回 EXTERNAL 监听器地址
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9092'

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 15
      CLUSTER_ID: mayoistar-kafka-cluster
    ports:
      # 只有 EXTERNAL 端口需要暴露给宿主机
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          # 探针改用内部端口测试
          "kafka-broker-api-versions --bootstrap-server kafka:29092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mayoistar

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: mayoistar
      # 核心：kafka-ui 属于 Docker 内部网络，必须使用 INTERNAL 监听器指定的地址和端口
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    restart: unless-stopped
    networks:
      - mayoistar

volumes:
  postgres-data:
  redis-data:
  rustfs-data:
  kafka-data:

networks:
  mayoistar:
    driver: bridge
