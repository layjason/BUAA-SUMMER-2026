services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mayoistar-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MAYOISTAR_DB_HOST: postgres
      MAYOISTAR_DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      MAYOISTAR_REDIS_HOST: redis
      MAYOISTAR_REDIS_PORT: 6379
      MAYOISTAR_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MAYOISTAR_S3_ENDPOINT: http://rustfs:9000
      MAYOISTAR_S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      MAYOISTAR_S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      MAYOISTAR_S3_BUCKET: ${MAYOISTAR_S3_BUCKET:-mayoistar-media}
    ports:
      - "${MAYOISTAR_SERVER_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - mayoistar

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mayoistar

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mayoistar

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - mayoistar

volumes:
  postgres-data:
  redis-data:
  rustfs-data:

networks:
  mayoistar:
    driver: bridge
