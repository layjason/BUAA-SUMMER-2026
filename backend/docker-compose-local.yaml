services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    restart: unless-stopped

  mailhog:
    image: ${MAILHOG_IMAGE:-mailhog/mailhog:v1.0.1}
    ports:
      - "${DEV_MAILHOG_SMTP_PORT:-1025}:1025"
      - "${DEV_MAILHOG_HTTP_PORT:-8025}:8025"
    restart: unless-stopped

volumes:
  postgres-local-data:
