        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.longitude'
        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.latitude'
        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.distanceMeters'
        - $ref: '#/components/parameters/PageQuery.page'
        - $ref: '#/components/parameters/PageQuery.pageSize'
