openapi: 3.0.0
info:
  title: 迷星群聚平台 API
  description: 迷星群聚平台 API 契约。除二进制导出外，业务接口 HTTP 状态码固定为 200，响应体统一使用 APIResponse。
  version: 0.0.0
tags:
  - name: 身份与资料
  - name: 活动
  - name: AI 辅助
  - name: 好友社群
  - name: 即时通讯
  - name: 后台管理
  - name: 通用
paths:
  /activities/drafts:
    post:
      operationId: ActivityOperations_saveDraft
      description: 保存活动草稿，调用方已登录，创建或更新草稿，草稿不会进入发现列表。
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    required:
                      - code
                      - message
                      - data
                    properties:
                      code:
                        type: number
                        enum:
                          - 200
                        description: 平台响应代码，成功响应固定为 200。
                      message:
                        type: string
                        enum:
                          - For Super Earth!
                        description: 平台响应消息，成功响应固定为 For Super Earth!。
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Activities.ActivityDraftDetail'
                        description: 响应数据。
                    description: 平台统一 JSON 成功响应，code 固定为 200，data 承载强类型业务数据。
                  - $ref: '#/components/schemas/BadRequestResponse'
                  - $ref: '#/components/schemas/UnauthorizedResponse'
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/InternalServerErrorResponse'
                  - $ref: '#/components/schemas/Errors.Activities.InvalidActivitySchedule'
                  - $ref: '#/components/schemas/Errors.Activities.MediaFileUnavailable'
      tags:
        - 活动
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activities.ActivityDraftUpsertRequest'
    get:
      operationId: ActivityOperations_listDrafts
      description: 获取我的活动草稿列表，调用方已登录，分页返回本人创建的草稿。
      parameters:
        - $ref: '#/components/parameters/PageQuery.page'
        - $ref: '#/components/parameters/PageQuery.pageSize'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    required:
                      - code
                      - message
                      - data
                    properties:
                      code:
                        type: number
                        enum:
                          - 200
                        description: 平台响应代码，成功响应固定为 200。
                      message:
                        type: string
                        enum:
                          - For Super Earth!
                        description: 平台响应消息，成功响应固定为 For Super Earth!。
                      data:
                        type: object
                        required:
                          - items
                          - total
                          - page
                          - pageSize
                          - totalPages
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Activities.ActivityDraftSummary'
                            description: 当前页数据。
                          total:
                            type: integer
                            format: int64
                            description: 匹配总数。
                          page:
                            type: integer
                            format: int32
                            description: 当前页码。
                          pageSize:
                            type: integer
                            format: int32
                            description: 每页数量。
                          totalPages:
                            type: integer
                            format: int32
                            description: 匹配总页数。
                        description: 响应数据。
                    description: 平台统一 JSON 成功响应，code 固定为 200，data 承载强类型业务数据。
                  - $ref: '#/components/schemas/BadRequestResponse'
                  - $ref: '#/components/schemas/UnauthorizedResponse'
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/InternalServerErrorResponse'
      tags:
        - 活动
  /activities/drafts/{activityId}:
    get:
      operationId: ActivityOperations_getDraft
      description: 获取活动草稿详情，调用方为草稿发起人，用于草稿编辑页回显。
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/EntityId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    required:
                      - code
                      - message
                      - data
                    properties:
                      code:
                        type: number
                        enum:
                          - 200
                        description: 平台响应代码，成功响应固定为 200。
                      message:
                        type: string
                        enum:
                          - For Super Earth!
                        description: 平台响应消息，成功响应固定为 For Super Earth!。
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Activities.ActivityDraftDetail'
                        description: 响应数据。
                    description: 平台统一 JSON 成功响应，code 固定为 200，data 承载强类型业务数据。
                  - $ref: '#/components/schemas/BadRequestResponse'
                  - $ref: '#/components/schemas/UnauthorizedResponse'
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/InternalServerErrorResponse'
                  - $ref: '#/components/schemas/Errors.Activities.ActivityNotVisible'
                  - $ref: '#/components/schemas/Errors.Activities.ActivityPermissionDenied'
      tags:
        - 活动
    patch:
      operationId: ActivityOperations_updateDraft
      description: 更新活动草稿，调用方为草稿发起人，草稿内容更新，已提交审核的活动不能按草稿规则覆盖。
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/EntityId'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    required:
                      - code
                      - message
                      - data
                    properties:
                      code:
                        type: number
                        enum:
                          - 200
                        description: 平台响应代码，成功响应固定为 200。
                      message:
                        type: string
                        enum:
                          - For Super Earth!
                        description: 平台响应消息，成功响应固定为 For Super Earth!。
                      data:
                        allOf:
                          - $ref: '#/components/schemas/Activities.ActivityDraftDetail'
                        description: 响应数据。
                    description: 平台统一 JSON 成功响应，code 固定为 200，data 承载强类型业务数据。
                  - $ref: '#/components/schemas/BadRequestResponse'
                  - $ref: '#/components/schemas/UnauthorizedResponse'
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/InternalServerErrorResponse'
                  - $ref: '#/components/schemas/Errors.Activities.ActivityNotVisible'
                  - $ref: '#/components/schemas/Errors.Activities.ActivityPermissionDenied'
                  - $ref: '#/components/schemas/Errors.Activities.InvalidActivitySchedule'
                  - $ref: '#/components/schemas/Errors.Activities.ActivityStateNotSubmittable'
                  - $ref: '#/components/schemas/Errors.Activities.MediaFileUnavailable'
      tags:
        - 活动
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activities.ActivityDraftUpsertRequest'
  /activities/feed:
    get:
      operationId: ActivityOperations_getFeed
      description: 获取首页活动信息流，tab 指定推荐、最新或附近，返回分页活动摘要，GET 参数全部位于 URL。
