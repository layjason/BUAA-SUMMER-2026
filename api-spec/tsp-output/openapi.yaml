        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.keyword'
        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.activityTypes'
        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.city'
        - $ref: '#/components/parameters/Activities.ActivitySearchQuery.startAtFrom'
