        - type: object
          required:
            - code
            - message
            - data
          properties:
            code:
              type: number
              enum:
                - 401
              description: 平台错误代码，小于 1000 为通用错误代码，大于等于 10000 为业务错误代码。
            message:
              type: string
              enum:
                - Authentication is required
              description: 平台错误消息，业务错误使用英文模板文案。
            data:
              allOf:
                - $ref: '#/components/schemas/EmptyData'
              description: 错误上下文，默认无额外业务数据。
          description: 平台统一 JSON 错误响应，code 与 message 由通用错误或业务错误类型固定，data 默认为空对象。
      description: 调用方未提供有效 Bearer Token，或 Token 已过期。
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
