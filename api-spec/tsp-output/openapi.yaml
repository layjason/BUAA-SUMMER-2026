                  - $ref: '#/components/schemas/InternalServerErrorResponse'
                  - $ref: '#/components/schemas/Errors.Activities.ImageFormatInvalid'
                  - $ref: '#/components/schemas/Errors.Activities.ImageTooLarge'
      tags:
        - 活动
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MediaUploadRequest'
  /activities/media/review-images:
