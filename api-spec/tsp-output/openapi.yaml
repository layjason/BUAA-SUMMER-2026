                            description: 当前页数据。
                          total:
                            type: integer
                            format: int64
                            description: 匹配总数。
                          page:
                            type: integer
                            format: int32
                            description: 当前页码。
                          pageSize:
                            type: integer
                            format: int32
                            description: 每页数量。
                          totalPages:
                            type: integer
                            format: int32
                            description: 匹配总页数。
                        description: 响应数据。
                    description: 平台统一 JSON 成功响应，code 固定为 200，data 承载强类型业务数据。
