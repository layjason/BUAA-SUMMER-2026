name: Frontend CI

on:
  push:
    paths:
      - "frontend/mayoistar-web/**"
  pull_request:
    paths:
      - "frontend/mayoistar-web/**"

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mayoistar-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/mayoistar-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install editorconfig-checker
        run: |
          curl -sSL https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v3.6.1/ec-linux-amd64.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin bin/ec-linux-amd64
          sudo mv /usr/local/bin/ec-linux-amd64 /usr/local/bin/ec

      - name: Check EditorConfig
        run: ec

      - name: Check formatting
        run: pnpm exec prettier . --check

      - name: Check TypeScript
        run: pnpm exec tsc --noEmit

      - name: Check ESLint
        run: pnpm exec eslint .

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm run build
