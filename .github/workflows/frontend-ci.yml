name: Frontend CI

on:
  push:
    paths:
      - "frontend/mayoistar-web/**"
  pull_request:
    paths:
      - "frontend/mayoistar-web/**"

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mayoistar-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/mayoistar-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check EditorConfig
        run: pnpm dlx editorconfig-checker@6.1.1

      - name: Check formatting
        run: pnpm exec prettier . --check

      - name: Check TypeScript
        run: pnpm exec tsc --noEmit

      - name: Check ESLint
        run: pnpm exec eslint .

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm run build
