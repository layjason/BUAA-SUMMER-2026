name: MayoiStar Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api-spec/**"
      - "backend/**"
      - "frontend/mayoistar-web/**"
      - ".github/workflows/deploy.yml"

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install editorconfig-checker
        run: |
          curl -sSL https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v3.6.1/ec-linux-amd64.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin bin/ec-linux-amd64
          sudo mv /usr/local/bin/ec-linux-amd64 /usr/local/bin/ec

      - name: Check EditorConfig
        run: ec

      - name: Check formatting
        run: mvn -B -ntp spotless:check

      - name: Check SpotBugs
        run: mvn -B -ntp spotbugs:check

      - name: Test
        run: mvn -B -ntp test

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mayoistar-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/mayoistar-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install editorconfig-checker
        run: |
          curl -sSL https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v3.6.1/ec-linux-amd64.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin bin/ec-linux-amd64
          sudo mv /usr/local/bin/ec-linux-amd64 /usr/local/bin/ec

      - name: Check EditorConfig
        run: ec

      - name: Check formatting
        run: pnpm exec prettier . --check

      - name: Check TypeScript
        run: pnpm exec tsc --noEmit

      - name: Check ESLint
        run: pnpm exec eslint .

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm run build

  deploy:
    name: Full Stack Deployment
    runs-on: self-hosted
    needs:
      - backend-checks
      - frontend-checks
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment Variables
        run: |
          touch .env

          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_IMAGE=postgres:17-alpine" >> .env

          echo "REDIS_IMAGE=redis:7-alpine" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env

          echo "RUSTFS_ACCESS_KEY=${{ secrets.RUSTFS_ACCESS_KEY }}" >> .env
          echo "RUSTFS_SECRET_KEY=${{ secrets.RUSTFS_SECRET_KEY }}" >> .env
          echo "MAYOISTAR_S3_ENDPOINT=http://rustfs:9000" >> .env
          echo "MAYOISTAR_S3_REGION=us-east-1" >> .env
          echo "MAYOISTAR_S3_BUCKET=mayoistar-media" >> .env
          echo "RUSTFS_HEALTHCHECK_HOST=127.0.0.1" >> .env

          echo "KAFKA_EXTERNAL_HOST=localhost" >> .env
          echo "KAFKA_EXTERNAL_PORT=9092" >> .env
          echo "KAFKA_UI_PORT=8081" >> .env

          echo "MAYOISTAR_JWT_SECRET=${{ secrets.MAYOISTAR_JWT_SECRET }}" >> .env

          echo "MAYOISTAR_MAIL_SENDER=mayoistar@stellan.cloud" >> .env
          echo "MAYOISTAR_MAIL_USERNAME=a0bf5e001@smtp-brevo.com" >> .env
          echo "MAYOISTAR_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo "MAYOISTAR_MAIL_HOST=smtp-relay.brevo.com" >> .env
          echo "MAYOISTAR_MAIL_PORT=587" >> .env

          echo "MAYOISTAR_ACTIVATION_BASE_URL=https://${{ secrets.HOSTNAME }}/activate" >> .env
          echo "MAYOISTAR_PASSWORD_RESET_BASE_URL=https://${{ secrets.HOSTNAME }}/reset-password" >> .env
          echo "MAYOISTAR_SERVER_PORT=10086" >> .env

          echo "MAYOISTAR_ALIYUN_IMAGEAUDIT_ENDPOINT=imageaudit.cn-shanghai.aliyuncs.com" >> .env
          echo "ALIBABA_CLOUD_ACCESS_KEY_ID=${{ secrets.ALIBABA_AK }}" >> .env
          echo "ALIBABA_CLOUD_ACCESS_KEY_SECRET=${{ secrets.ALIBABA_SK }}" >> .env

          echo "MAYOISTAR_AI_ACTIVITY_PLANNING_ENDPOINT=${{ secrets.AI_ACTIVITY_PLANNING_ENDPOINT }}" >> .env
          echo "MAYOISTAR_AI_ACTIVITY_PLANNING_MODEL=${{ secrets.AI_ACTIVITY_PLANNING_MODEL }}" >> .env
          echo "MAYOISTAR_AI_ACTIVITY_PLANNING_API_KEY=${{ secrets.AI_ACTIVITY_PLANNING_API_KEY }}" >> .env
          echo "MAYOISTAR_AI_MAX_REQUESTS_PER_MINUTE=8" >> .env

          echo ".env file generated successfully."

      - name: Docker Compose Deploy
        run: |
          echo "Starting Full Stack Deployment..."

          docker compose down --remove-orphans

          docker compose up -d --build

          docker system prune -f -a

          echo "Deployment Successful!"
