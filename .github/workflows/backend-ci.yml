name: Backend CI

on:
  push:
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js for editorconfig-checker
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check EditorConfig
        run: npx editorconfig-checker@6.1.1

      - name: Check formatting
        run: mvn -B -ntp spotless:check

      - name: Test
        run: mvn -B -ntp test

      - name: Check SpotBugs
        run: mvn -B -ntp spotbugs:check
