name: API Spec CI

on:
  push:
    paths:
      - "api-spec/**"
      - ".github/workflows/api-spec-ci.yml"
  pull_request:
    paths:
      - "api-spec/**"
      - ".github/workflows/api-spec-ci.yml"

jobs:
  api-spec-checks:
    name: API spec checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-spec

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: api-spec/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeSpec formatting
        run: pnpm format:check

      - name: Compile TypeSpec
        run: pnpm compile
