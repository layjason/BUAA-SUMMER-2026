name: Mayoistar Client CI

on:
  push:
    paths:
      - "api-spec/**"
      - "frontend/mayoistar-client/**"
      - ".github/workflows/frontend-client-ci.yml"
  pull_request:
    paths:
      - "api-spec/**"
      - "frontend/mayoistar-client/**"
      - ".github/workflows/frontend-client-ci.yml"

jobs:
  client-checks:
    name: Mayoistar Client checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mayoistar-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/mayoistar-client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check EditorConfig
        run: pnpm exec ec

      - name: Check formatting
        run: pnpm exec prettier . --check

      - name: Check TypeScript
        run: pnpm exec vue-tsc --noEmit

      - name: Check Oxlint
        run: pnpm exec oxlint .

      - name: Check ESLint
        run: pnpm exec eslint .

      - name: Run unit tests
        run: pnpm test

      - name: Build H5
        run: pnpm run build:h5